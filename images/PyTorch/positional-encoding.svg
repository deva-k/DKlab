<svg viewBox="0 0 750 320" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect x="0" y="0" width="750" height="320" fill="white"/>
  
  <!-- Title -->
  <text x="375" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">Where Positional Encoding Goes in Encoder</text>
  
  <!-- Left side: Input Processing -->
  <g transform="translate(50, 50)">
    
    <!-- Raw Tokens -->
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="12" fill="#666" font-weight="600">1. Raw Tokens</text>
    <g transform="translate(0, 25)">
      <rect x="0" y="0" width="45" height="30" rx="4" fill="#e3f2fd" stroke="#2196f3" stroke-width="1.5"/>
      <text x="22.5" y="20" text-anchor="middle" font-size="11" fill="#1976d2">The</text>
      
      <rect x="55" y="0" width="45" height="30" rx="4" fill="#e3f2fd" stroke="#2196f3" stroke-width="1.5"/>
      <text x="77.5" y="20" text-anchor="middle" font-size="11" fill="#1976d2">cat</text>
      
      <rect x="110" y="0" width="45" height="30" rx="4" fill="#e3f2fd" stroke="#2196f3" stroke-width="1.5"/>
      <text x="132.5" y="20" text-anchor="middle" font-size="11" fill="#1976d2">sat</text>
    </g>
    
    <!-- Down arrows -->
    <g transform="translate(0, 60)">
      <path d="M 22.5 0 L 22.5 20" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
      <path d="M 77.5 0 L 77.5 20" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
      <path d="M 132.5 0 L 132.5 20" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    </g>
    
    <!-- Token Embeddings -->
    <text x="0" y="100" font-family="Arial, sans-serif" font-size="12" fill="#666" font-weight="600">2. Token Embeddings</text>
    <g transform="translate(0, 110)">
      <rect x="0" y="0" width="45" height="30" rx="4" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
      <text x="22.5" y="20" text-anchor="middle" font-size="9" fill="#7b1fa2">[vec1]</text>
      
      <rect x="55" y="0" width="45" height="30" rx="4" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
      <text x="77.5" y="20" text-anchor="middle" font-size="9" fill="#7b1fa2">[vec2]</text>
      
      <rect x="110" y="0" width="45" height="30" rx="4" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
      <text x="132.5" y="20" text-anchor="middle" font-size="9" fill="#7b1fa2">[vec3]</text>
    </g>
    
    <!-- Plus signs -->
    <g transform="translate(0, 155)">
      <circle cx="22.5" cy="0" r="10" fill="white" stroke="#4caf50" stroke-width="2"/>
      <text x="22.5" y="4" text-anchor="middle" font-size="14" font-weight="bold" fill="#4caf50">+</text>
      
      <circle cx="77.5" cy="0" r="10" fill="white" stroke="#4caf50" stroke-width="2"/>
      <text x="77.5" y="4" text-anchor="middle" font-size="14" font-weight="bold" fill="#4caf50">+</text>
      
      <circle cx="132.5" cy="0" r="10" fill="white" stroke="#4caf50" stroke-width="2"/>
      <text x="132.5" y="4" text-anchor="middle" font-size="14" font-weight="bold" fill="#4caf50">+</text>
    </g>
    
    <!-- Positional Encodings -->
    <text x="0" y="185" font-family="Arial, sans-serif" font-size="12" fill="#666" font-weight="600">3. Positional Encodings</text>
    <g transform="translate(0, 195)">
      <rect x="0" y="0" width="45" height="30" rx="4" fill="#fff8e1" stroke="#ff9800" stroke-width="1.5"/>
      <text x="22.5" y="20" text-anchor="middle" font-size="10" fill="#e65100">Pos 0</text>
      
      <rect x="55" y="0" width="45" height="30" rx="4" fill="#fff8e1" stroke="#ff9800" stroke-width="1.5"/>
      <text x="77.5" y="20" text-anchor="middle" font-size="10" fill="#e65100">Pos 1</text>
      
      <rect x="110" y="0" width="45" height="30" rx="4" fill="#fff8e1" stroke="#ff9800" stroke-width="1.5"/>
      <text x="132.5" y="20" text-anchor="middle" font-size="10" fill="#e65100">Pos 2</text>
    </g>
  </g>
  
  <!-- Arrow with label -->
  <g transform="translate(210, 140)">
    <!-- Label positioned well above arrow -->
    <text x="45" y="0" text-anchor="middle" font-size="10" fill="#666" font-style="italic">Input with</text>
    <text x="45" y="12" text-anchor="middle" font-size="10" fill="#666" font-style="italic">positions</text>
    <!-- Arrow positioned below text -->
    <path d="M 10 25 L 75 25" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Encoder Stack (detailed) -->
  <g transform="translate(300, 60)">
    <rect x="0" y="0" width="380" height="220" rx="8" fill="#f0f7ff" stroke="#1565c0" stroke-width="2.5"/>
    <text x="190" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0d47a1">TRANSFORMER ENCODER</text>
    
    <!-- Important note -->
    <rect x="10" y="40" width="360" height="30" rx="4" fill="#ffebee" stroke="#d32f2f" stroke-width="1.5"/>
    <text x="190" y="58" text-anchor="middle" font-size="11" font-weight="600" fill="#b71c1c">⚠️ Positional encoding is added BEFORE entering encoder</text>
    
    <!-- Encoder Block 1 -->
    <g transform="translate(15, 85)">
      <rect x="0" y="0" width="350" height="55" rx="6" fill="white" stroke="#1976d2" stroke-width="1.5"/>
      <text x="10" y="15" font-size="10" font-weight="600" fill="#666">Encoder Layer 1:</text>
      
      <rect x="10" y="20" width="100" height="25" rx="3" fill="#e8f5e9" stroke="#4caf50" stroke-width="1"/>
      <text x="60" y="36" text-anchor="middle" font-size="9" fill="#2e7d32">Multi-Head Attention</text>
      
      <path d="M 110 32.5 L 125 32.5" stroke="#666" stroke-width="1" marker-end="url(#arrowhead-small)"/>
      
      <rect x="125" y="20" width="80" height="25" rx="3" fill="#e3f2fd" stroke="#2196f3" stroke-width="1"/>
      <text x="165" y="36" text-anchor="middle" font-size="9" fill="#1565c0">Feed-Forward</text>
      
      <path d="M 205 32.5 L 220 32.5" stroke="#666" stroke-width="1" marker-end="url(#arrowhead-small)"/>
      
      <rect x="220" y="20" width="60" height="25" rx="3" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
      <text x="250" y="36" text-anchor="middle" font-size="9" fill="#6a1b9a">Layer Norm</text>
      
      <text x="290" y="36" font-size="9" fill="#666">→ Output</text>
    </g>
    
    <!-- Encoder Block 2 -->
    <g transform="translate(15, 150)">
      <rect x="0" y="0" width="350" height="55" rx="6" fill="white" stroke="#1976d2" stroke-width="1.5"/>
      <text x="10" y="15" font-size="10" font-weight="600" fill="#666">Encoder Layer 2:</text>
      
      <rect x="10" y="20" width="100" height="25" rx="3" fill="#e8f5e9" stroke="#4caf50" stroke-width="1"/>
      <text x="60" y="36" text-anchor="middle" font-size="9" fill="#2e7d32">Multi-Head Attention</text>
      
      <path d="M 110 32.5 L 125 32.5" stroke="#666" stroke-width="1" marker-end="url(#arrowhead-small)"/>
      
      <rect x="125" y="20" width="80" height="25" rx="3" fill="#e3f2fd" stroke="#2196f3" stroke-width="1"/>
      <text x="165" y="36" text-anchor="middle" font-size="9" fill="#1565c0">Feed-Forward</text>
      
      <path d="M 205 32.5 L 220 32.5" stroke="#666" stroke-width="1" marker-end="url(#arrowhead-small)"/>
      
      <rect x="220" y="20" width="60" height="25" rx="3" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
      <text x="250" y="36" text-anchor="middle" font-size="9" fill="#6a1b9a">Layer Norm</text>
      
      <text x="290" y="36" font-size="9" fill="#666">→ Output</text>
    </g>
    
    <text x="190" y="230" text-anchor="middle" font-size="10" fill="#666" font-style="italic">... more encoder layers ...</text>
  </g>
  
  <!-- Key Point Box -->
  <g transform="translate(50, 285)">
    <rect x="0" y="0" width="630" height="25" rx="4" fill="#e8f5e9" stroke="#4caf50" stroke-width="1.5"/>
    <text x="10" y="17" font-size="11" font-weight="600" fill="#2e7d32">KEY:</text>
    <text x="50" y="17" font-size="11" fill="#1b5e20">Positional encoding happens ONCE at the input, BEFORE any encoder processing begins</text>
  </g>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" fill="#666">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="arrowhead-small" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto" fill="#666">
      <polygon points="0 0, 7 2.5, 0 5"/>
    </marker>
  </defs>
</svg>
